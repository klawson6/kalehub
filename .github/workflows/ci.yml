name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Docker image builds (run unit tests inside tester stage) ──────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API (runs unit tests in tester stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/api/Dockerfile.prod
          target: tester
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-ws:
    name: Build WS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build WS (runs unit tests in tester stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/ws/Dockerfile.prod
          target: tester
          push: false
          cache-from: type=gha,scope=ws
          cache-to: type=gha,scope=ws,mode=max

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Web (runs unit tests in tester stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/web/Dockerfile.prod
          target: tester
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  # ── Shared install — lint and typecheck restore from this cache ───────────────
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/ws/node_modules
            apps/web/node_modules
            packages/types/node_modules
            packages/db/node_modules
          key: nm-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

  # ── Native checks (lint + typecheck share the install from setup) ─────────────
  lint:
    name: Lint
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/ws/node_modules
            apps/web/node_modules
            packages/types/node_modules
            packages/db/node_modules
          key: nm-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm lint

  typecheck:
    name: Typecheck
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/ws/node_modules
            apps/web/node_modules
            packages/types/node_modules
            packages/db/node_modules
          key: nm-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm build --filter @kalehub/types --filter @kalehub/db
      - run: pnpm typecheck

  # ── Storybook smoke test ───────────────────────────────────────────────────────
  test-storybook:
    name: Storybook Tests
    runs-on: ubuntu-latest
    needs: [build-web, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/ws/node_modules
            apps/web/node_modules
            packages/types/node_modules
            packages/db/node_modules
          key: nm-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm build --filter @kalehub/types --filter @kalehub/db
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Build Storybook
        run: pnpm --filter web storybook:build
      - name: Run Storybook tests
        run: |
          npx concurrently -k -s first -n "SB,TEST" \
            "npx http-server apps/web/storybook-static --port 6006 --silent" \
            "npx wait-on http://localhost:6006 && pnpm --filter web test:storybook"

  # ── E2E tests (full stack via Docker Compose) ─────────────────────────────────
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build-api, build-ws, build-web]
    env:
      POSTGRES_USER: kalehub
      POSTGRES_PASSWORD: kalehub
      POSTGRES_DB: kalehub
      POSTGRES_DB_KEYCLOAK: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_CLIENT_ID: kalehub-app
      KEYCLOAK_CLIENT_SECRET: dev-secret-changeme-in-env
      KEYCLOAK_ISSUER: http://localhost:8080/realms/kalehub
      AUTH_SECRET: ci-auth-secret-example
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3002
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_API_URL: http://localhost:3001
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Start stack and wait for all services to be healthy
        run: docker compose up -d --wait --build
        timeout-minutes: 10
      - name: Run Playwright E2E tests
        run: docker compose --profile e2e run --rm playwright
      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down stack
        if: always()
        run: docker compose down -v
