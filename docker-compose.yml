services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_DB_KEYCLOAK: ${POSTGRES_DB_KEYCLOAK}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB_KEYCLOAK}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/kalehub HTTP/1.0\\r\\nHost: localhost:8080\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: .docker/api/Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      WEB_URL: http://localhost:3000
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  ws:
    build:
      context: .
      dockerfile: .docker/ws/Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      WEB_URL: http://localhost:3000
      PORT: 3002
      NODE_ENV: development
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  web:
    build:
      context: .
      dockerfile: .docker/web/Dockerfile.dev
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      # External issuer — matches the iss claim in Keycloak tokens (KC_HOSTNAME=localhost)
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      # Internal Docker hostname — used by Auth.js for server-side token exchange
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/realms/kalehub
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      # Internal Docker hostname — used by RSC server-side fetch to the API
      API_URL: http://api:3001
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # E2E test runner — Playwright with Chromium bundled (no local browser install needed).
  # Usage:  docker compose --profile e2e run --rm playwright
  #
  # Linux / CI: network_mode: host lets localhost:3000/8080 reach the host's port-mapped services.
  # Mac local:  comment out network_mode, uncomment extra_hosts, and set
  #             PLAYWRIGHT_BASE_URL=http://host.docker.internal:3000
  playwright:
    build:
      context: .
      dockerfile: .docker/web/Dockerfile.e2e
    profiles: [e2e]
    network_mode: host
    # extra_hosts:                               # Mac alternative to network_mode: host
    #   - "host.docker.internal:host-gateway"
    environment:
      PLAYWRIGHT_BASE_URL: ${PLAYWRIGHT_BASE_URL:-http://localhost:3000}
      PLAYWRIGHT_API_URL: ${PLAYWRIGHT_API_URL:-http://localhost:3001}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8080}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      CI: ${CI:-}

volumes:
  postgres_data:
  redis_data:
